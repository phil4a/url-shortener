name: Tests
on:
  push:
    branches:
      - main
  pull_request:
    branches: ['*']

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/build
      - name: Run tests
        run: pnpm run test

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/build
      - name: Start test services
        run: pnpm run docker:start:test
      - name: Show containers
        run: docker compose -f docker-compose-test.yml ps
      - name: Wait for database
        run: pnpm run wait-for-db
      - name: Apply test migrations
        run: pnpm run db:migrate:test
      - name: Run e2e tests
        run: pnpm exec dotenv -e .env.test -- jest --runInBand --config ./test/jest-e2e.json
      - name: Show service logs (on failure)
        if: failure()
        run: |
          docker compose -f docker-compose-test.yml ps
          docker compose -f docker-compose-test.yml logs --no-color --tail 200 url_shortener_test_postgres
          docker compose -f docker-compose-test.yml logs --no-color --tail 200 url_shortener_test_redis
      - name: Stop test services
        if: always()
        run: pnpm run docker:down:test
        env:
          POSTGRES_USER: username
          POSTGRES_PASSWORD: password
          POSTGRES_DB: starter
          POSTGRES_PORT: 5444
