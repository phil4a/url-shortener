services:
  url_shortener_test_postgres: #Needs update
    image: postgres:alpine
    container_name: url_shortener_test_postgres #Needs update
    restart: 'no'
    env_file: '.env.test'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 5444:5432
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -h 127.0.0.1',
        ]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s
    volumes:
      - url_shortener_test_postgres_data:/var/lib/postgresql/data #Needs update

  url_shortener_test_redis: #Needs update
    image: redis:alpine
    env_file: '.env.test'
    container_name: url_shortener_test_redis #Needs update
    ports:
      - 6380:6379
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s
    volumes:
      - url_shortener_test_redis_data:/data #Needs update

networks:
  default:
    name: url_shortener_test #Needs update

volumes:
  url_shortener_test_postgres_data: #Needs update
  url_shortener_test_redis_data: #Needs update
