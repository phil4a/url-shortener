services:
  url_shortener_postgres: #Needs update
    image: postgres:alpine
    container_name: url_shortener_postgres #Needs update
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - url_shortener_postgres_data:/var/lib/postgresql #Needs update

  url_shortener_redis: #Needs update
    image: redis:alpine
    container_name: url_shortener_redis #Needs update
    ports:
      - 6379:6379
    volumes:
      - url_shortener_redis_data:/data #Needs update

networks:
  default:
    name: url_shortener #Needs update

volumes:
  url_shortener_postgres_data: #Needs update
  url_shortener_redis_data: #Needs update
